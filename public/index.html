<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini AI Chatbot</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header class="chat-header">
      <div class="brand">
        <span class="icon">🤖</span>
        <h1>Gemini AI Chatbot</h1>
      </div>
      <!-- Theme Toggle Button -->
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <!-- Sun Icon (visible in Dark Mode) -->
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <!-- Moon Icon (visible in Light Mode) -->
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
      </button>
    </header>

    <div id="chat-box" class="chat-box">
      <!-- Welcome message -->
      <div class="welcome-container">
        <div class="welcome-avatar">🎓</div>
        <h2>Halo! Selamat datang di Mandarin Learning Assistant.</h2>
        <p>Tanyakan apa saja seputar bahasa Mandarin, dari tata bahasa, kosakata, hingga percakapan sehari-hari!</p>
      </div>
    </div>

    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Ketik pesan Anda di sini..." autocomplete="off" required />
      <button type="submit" id="send-btn" aria-label="Send Message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <!-- Markdown Parser Library (marked) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
